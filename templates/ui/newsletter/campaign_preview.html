<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorschau: {{ campaign.name }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .preview-header {
            background-color: #fff;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .preview-header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .preview-header p {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 14px;
        }
        .preview-body {
            background-color: #fff;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }
        .preview-notice {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="preview-notice">
        <strong>Vorschau-Modus:</strong> Dies ist eine Vorschau der Kampagne. Links und interaktive Elemente funktionieren möglicherweise nicht.
    </div>

    <div class="preview-header">
        <h1>{{ campaign.subject }}</h1>
        {% if campaign.preview_text %}
        <p>{{ campaign.preview_text }}</p>
        {% endif %}
    </div>

    <div class="preview-body">
        {{ campaign.html_body|safe }}
    </div>
</body>
</html>
